<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>출근 체크인</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;800;900&family=Bebas+Neue&display=swap');

  :root {
    --green: #00C851;
    --green-dark: #007E33;
    --green-light: #E8FFF0;
    --bg: #0A1628;
    --card: #111E35;
    --border: #1E3050;
    --text: #F0F4FF;
    --muted: #6B8BB5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 0 0 40px 0;
    position: relative;
    overflow-x: hidden;
  }

  /* 배경 효과 */
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,200,81,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* 헤더 배너 */
  .header {
    width: 100%;
    background: linear-gradient(135deg, var(--green-dark), var(--green));
    padding: 28px 24px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 30px rgba(0,200,81,0.35);
  }

  .header::before {
    content: '';
    position: absolute;
    top: -50%; right: -30%;
    width: 200px; height: 200px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
  }

  .header-badge {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.35);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    padding: 4px 14px;
    border-radius: 20px;
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    color: #fff;
    letter-spacing: 4px;
    line-height: 1;
    text-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }

  .header .subtitle {
    color: rgba(255,255,255,0.85);
    font-size: 13px;
    font-weight: 600;
    margin-top: 6px;
    letter-spacing: 1px;
  }

  /* 시간 표시 */
  .time-display {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin: 20px 16px 0;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    z-index: 1;
  }

  .time-left .label {
    font-size: 10px;
    color: var(--muted);
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .time-left .date-str {
    font-size: 14px;
    color: var(--text);
    font-weight: 600;
    margin-top: 2px;
  }

  .time-right .clock {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    color: var(--green);
    letter-spacing: 2px;
    line-height: 1;
  }

  /* 카드 */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    margin: 14px 16px 0;
    padding: 22px 20px;
    position: relative;
    z-index: 1;
  }

  .card-title {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 2.5px;
    color: var(--green);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* 폼 필드 */
  .field {
    margin-bottom: 14px;
  }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 7px;
    text-transform: uppercase;
  }

  .field input, .field select {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 13px 16px;
    font-size: 16px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    appearance: none;
    -webkit-appearance: none;
  }

  .field input:focus, .field select:focus {
    border-color: var(--green);
    background: rgba(0,200,81,0.06);
  }

  .field input::placeholder {
    color: #3A5070;
  }

  .field select option {
    background: #1a2a40;
    color: var(--text);
  }

  /* 제출 버튼 */
  .submit-btn {
    width: calc(100% - 32px);
    margin: 16px 16px 0;
    padding: 18px;
    background: linear-gradient(135deg, var(--green), #00A844);
    border: none;
    border-radius: 16px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 2px;
    cursor: pointer;
    position: relative;
    z-index: 1;
    box-shadow: 0 6px 30px rgba(0,200,81,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .submit-btn:active {
    transform: scale(0.97);
    box-shadow: 0 3px 15px rgba(0,200,81,0.3);
  }

  .submit-btn .icon { font-size: 20px; }

  /* 성공 화면 */
  .success-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }

  .success-screen.show { display: flex; }

  .success-circle {
    width: 120px; height: 120px;
    background: linear-gradient(135deg, var(--green), #00A844);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 52px;
    margin-bottom: 28px;
    box-shadow: 0 0 60px rgba(0,200,81,0.5);
    animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes pop {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .success-screen h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 44px;
    color: var(--green);
    letter-spacing: 4px;
    margin-bottom: 10px;
  }

  .success-screen p {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.7;
  }

  .success-info {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 24px;
    margin-top: 24px;
    width: 100%;
    max-width: 320px;
    text-align: left;
  }

  .success-info .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }

  .success-info .row:last-child { border-bottom: none; }
  .success-info .row .key { color: var(--muted); font-weight: 600; }
  .success-info .row .val { color: var(--text); font-weight: 700; }

  .reset-btn {
    margin-top: 28px;
    padding: 14px 32px;
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--muted);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  .reset-btn:active { border-color: var(--green); color: var(--green); }

  /* 로딩 */
  .loading { display: none; }
  .submit-btn.loading-state .loading { display: inline-block; }
  .submit-btn.loading-state .btn-text { display: none; }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .spinner {
    width: 22px; height: 22px;
    border: 3px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  /* 에러 메시지 */
  .error-msg {
    display: none;
    background: rgba(255,80,80,0.1);
    border: 1px solid rgba(255,80,80,0.3);
    color: #FF6B6B;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    margin: 10px 16px 0;
    position: relative;
    z-index: 1;
  }
  .error-msg.show { display: block; }

  /* 안내 */
  .notice {
    color: var(--muted);
    font-size: 11px;
    text-align: center;
    margin: 16px 16px 0;
    line-height: 1.8;
    position: relative;
    z-index: 1;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">생산실 · 외주인력</div>
  <h1>출 근</h1>
  <div class="subtitle">CHECK IN · 출근 등록</div>
</div>

<div class="time-display">
  <div class="time-left">
    <div class="label">오늘 날짜</div>
    <div class="date-str" id="dateStr">—</div>
  </div>
  <div class="time-right">
    <div class="clock" id="clockStr">00:00:00</div>
  </div>
</div>

<div class="card">
  <div class="card-title">기본 정보 입력</div>

  <div class="field">
    <label>이름 *</label>
    <input type="text" id="name" placeholder="홍길동" autocomplete="name" inputmode="text">
  </div>

  <div class="field">
    <label>소속 업체명 *</label>
    <input type="text" id="company" placeholder="예) OO종합 / OO인력" autocomplete="organization" inputmode="text">
  </div>

  <div class="field">
    <label>연락처 (선택)</label>
    <input type="tel" id="phone" placeholder="010-0000-0000" inputmode="tel">
  </div>
</div>

<div class="error-msg" id="errorMsg">⚠️ 이름과 소속 업체명은 필수입니다.</div>

<button class="submit-btn" id="submitBtn" onclick="submitForm()">
  <span class="btn-text"><span class="icon">✅</span> 출근 등록하기</span>
  <div class="loading"><div class="spinner"></div></div>
</button>

<div class="notice">
  📌 출근 시 반드시 등록해 주세요.<br>
  미등록 시 출근 인정이 되지 않을 수 있습니다.
</div>

<!-- 성공 화면 -->
<div class="success-screen" id="successScreen">
  <div class="success-circle">✅</div>
  <h2>출근 완료</h2>
  <p>출근이 정상적으로 등록되었습니다.</p>

  <div class="success-info" id="successInfo"></div>

  <button class="reset-btn" onclick="resetForm()">← 다시 등록하기</button>
</div>

<script>
  // ============================================================
  // ⚙️ 여기에 Google Apps Script 웹앱 URL을 입력하세요
  // ============================================================
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzfanZRCesW3L-1MhzPpDYfkNE2h4lkkyvbPRT56gchgboxANthOcFrSwTdMfa_08OY/exec';
  // ============================================================

  // 시계
  function updateClock() {
    const now = new Date();
    const days = ['일','월','화','수','목','금','토'];
    const y = now.getFullYear();
    const m = String(now.getMonth()+1).padStart(2,'0');
    const d = String(now.getDate()).padStart(2,'0');
    const day = days[now.getDay()];
    document.getElementById('dateStr').textContent = `${y}년 ${m}월 ${d}일 (${day})`;
    const h = String(now.getHours()).padStart(2,'0');
    const min = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('clockStr').textContent = `${h}:${min}:${s}`;
  }
  updateClock();
  setInterval(updateClock, 1000);

  function getTimestamp() {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth()+1).padStart(2,'0');
    const d = String(now.getDate()).padStart(2,'0');
    const h = String(now.getHours()).padStart(2,'0');
    const min = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    return { date: `${y}-${m}-${d}`, time: `${h}:${min}:${s}`, dateKr: `${y}년 ${m}월 ${d}일` };
  }

  // ✅ GPS 설정 - 생산실 위치
  const OFFICE_LAT = 37.3153155;
  const OFFICE_LNG = 126.7877251;
  const OFFICE_RADIUS = 200; // 허용 반경 (미터)

  // 두 좌표 간 거리 계산 (미터)
  function getDistance(lat1, lng1, lat2, lng2) {
    const R = 6371000;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLng/2) * Math.sin(dLng/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  // GPS 위치 확인
  function checkLocation() {
    return new Promise((resolve, reject) => {
      if (!navigator.geolocation) {
        reject('GPS를 지원하지 않는 기기입니다.');
        return;
      }
      navigator.geolocation.getCurrentPosition(
        pos => {
          const dist = getDistance(pos.coords.latitude, pos.coords.longitude, OFFICE_LAT, OFFICE_LNG);
          if (dist <= OFFICE_RADIUS) {
            resolve(dist);
          } else {
            reject(`현재 위치가 생산실에서 ${Math.round(dist)}m 떨어져 있습니다.\n생산실 내에서만 등록 가능합니다. (허용 반경: ${OFFICE_RADIUS}m)`);
          }
        },
        err => {
          reject('위치 정보를 가져올 수 없습니다.\n위치 권한을 허용해 주세요.');
        },
        { timeout: 10000, maximumAge: 0, enableHighAccuracy: true }
      );
    });
  }

  async function submitForm() {
    const name = document.getElementById('name').value.trim();
    const company = document.getElementById('company').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');

    // 유효성 검사
    if (!name || !company) {
      errorMsg.classList.add('show');
      return;
    }
    errorMsg.classList.remove('show');

    // 로딩 시작
    submitBtn.classList.add('loading-state');
    submitBtn.disabled = true;

    // ✅ GPS 위치 검증 + 좌표 수집
    let userLat = '', userLng = '', mapLink = '';
    try {
      const pos = await new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(resolve, reject,
          { timeout: 10000, maximumAge: 0, enableHighAccuracy: true });
      });
      const dist = getDistance(pos.coords.latitude, pos.coords.longitude, OFFICE_LAT, OFFICE_LNG);
      if (dist > OFFICE_RADIUS) {
        throw new Error(`현재 위치가 생산실에서 ${Math.round(dist)}m 떨어져 있습니다.\n생산실 내에서만 등록 가능합니다. (허용 반경: ${OFFICE_RADIUS}m)`);
      }
      userLat = pos.coords.latitude.toFixed(6);
      userLng = pos.coords.longitude.toFixed(6);
      mapLink = `https://maps.google.com/?q=${userLat},${userLng}`;
    } catch(locErr) {
      submitBtn.classList.remove('loading-state');
      submitBtn.disabled = false;
      errorMsg.textContent = '📍 ' + (locErr.message || locErr);
      errorMsg.classList.add('show');
      return;
    }

    const ts = getTimestamp();

    const params = new URLSearchParams({
      type: '출근',
      name,
      company,
      phone: phone || '-',
      date: ts.date,
      time: ts.time,
      lat: userLat,
      lng: userLng,
      maplink: mapLink
    });

    try {
      await fetch(`${SCRIPT_URL}?${params}`, { method: 'GET', mode: 'no-cors' });
      showSuccess({ name, company, phone, date: ts.dateKr, time: ts.time });
    } catch(e) {
      showSuccess({ name, company, phone, date: ts.dateKr, time: ts.time });
    } finally {
      submitBtn.classList.remove('loading-state');
      submitBtn.disabled = false;
    }
  }

  function showSuccess(data) {
    const info = document.getElementById('successInfo');
    const rows = [
      ['구분', '🟢 출근'],
      ['이름', data.name],
      ['소속', data.company],
      ['연락처', data.phone || '-'],
      ['날짜', data.date],
      ['시간', data.time],
    ];
    info.innerHTML = rows.map(([k,v]) => `
      <div class="row"><span class="key">${k}</span><span class="val">${v}</span></div>
    `).join('');
    document.getElementById('successScreen').classList.add('show');
  }

  function resetForm() {
    document.getElementById('name').value = '';
    document.getElementById('company').value = '';
    document.getElementById('phone').value = '';
    document.getElementById('successScreen').classList.remove('show');
    document.getElementById('errorMsg').classList.remove('show');
  }
</script>
</body>
</html>
