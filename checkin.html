<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>출근 등록</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#071108;--surface:#0d1f10;--surface-2:#132a17;
  --border:#1e4425;--border-focus:#2baa4a;
  --text:#e2f0e5;--text-dim:#7da987;--text-muted:#4a7452;
  --green:#00e676;--green-dark:#00c853;--green-glow:rgba(0,230,118,.25);
  --font:'Noto Sans KR',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --radius:16px;--radius-sm:11px;
}
html,body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100dvh;-webkit-font-smoothing:antialiased}
body{background:radial-gradient(ellipse at 50% -20%,rgba(0,230,118,.08) 0%,transparent 60%),var(--bg)}
.app{max-width:420px;margin:0 auto;padding:24px 16px 48px}

.hdr{text-align:center;padding:24px 0 12px}
.hdr-icon{width:72px;height:72px;margin:0 auto 16px;background:linear-gradient(135deg,var(--green),var(--green-dark));border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:34px;box-shadow:0 8px 40px var(--green-glow)}
.hdr h1{font-size:28px;font-weight:900;letter-spacing:-1px;color:#fff}
.hdr .sub{font-size:13px;color:var(--text-dim);margin-top:4px}

.clock-wrap{text-align:center;margin:20px 0 28px}
.clock{font-family:var(--mono);font-size:48px;font-weight:600;color:#fff;letter-spacing:3px;line-height:1}
.clock-date{font-size:13px;color:var(--text-dim);margin-top:6px}

.gps{display:flex;align-items:center;gap:9px;padding:12px 16px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:20px;font-size:12px;color:var(--text-dim)}
.gps-dot{width:8px;height:8px;border-radius:50%;background:var(--text-muted);flex-shrink:0}
.gps-dot.ok{background:var(--green);box-shadow:0 0 10px var(--green-glow);animation:pulse 2s infinite}
.gps-dot.err{background:#ff5252}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;box-shadow:0 4px 32px rgba(0,0,0,.4)}

.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-dim);margin-bottom:6px;letter-spacing:.3px}
.field input{width:100%;padding:14px 16px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:16px;outline:none;transition:border-color .2s,box-shadow .2s}
.field input:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px var(--green-glow)}
.field input::placeholder{color:var(--text-muted)}

.btn{width:100%;padding:18px;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:17px;font-weight:800;cursor:pointer;transition:all .2s;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,var(--green),var(--green-dark));color:#000;box-shadow:0 6px 28px var(--green-glow)}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-130px);max-width:380px;width:calc(100% - 32px);padding:16px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;z-index:999;transition:transform .35s cubic-bezier(.4,0,.2,1);box-shadow:0 8px 32px rgba(0,0,0,.5)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{background:#0d3322;border:1px solid rgba(0,230,118,.35);color:var(--green)}
.toast.error{background:#331015;border:1px solid rgba(255,82,82,.35);color:#ff5252}

.spinner{display:inline-block;width:18px;height:18px;border:2.5px solid rgba(0,0,0,.25);border-top-color:#000;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-icon">🟢</div>
    <h1>출근 등록</h1>
    <div class="sub">정보를 입력하고 출근 버튼을 눌러주세요</div>
  </div>
  <div class="clock-wrap">
    <div class="clock" id="clock">--:--:--</div>
    <div class="clock-date" id="clock-date">-</div>
  </div>
  <div class="card">
    <div class="gps"><div class="gps-dot" id="gps-dot"></div><span id="gps-txt">GPS 위치 확인 중...</span></div>
    <div class="field"><label>이름 *</label><input type="text" id="f-name" placeholder="홍길동" autocomplete="name"></div>
    <div class="field"><label>전화번호 *</label><input type="tel" id="f-phone" placeholder="010-1234-5678" autocomplete="tel"></div>
    <div class="field"><label>업체명 *</label><input type="text" id="f-company" placeholder="소속 업체명"></div>
    <button class="btn" id="btn" onclick="submit()">🟢 출근 등록</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbx9I3NtimSJMHbnYlPTOGdVC-nzO-sjv5c_ARe1hg0z-S_O451CZKNirim3yxY0znTqHQ/exec';

let lat=null,lng=null;
document.addEventListener('DOMContentLoaded',()=>{tick();setInterval(tick,1000);getGPS();restore()});

function tick(){const n=new Date();document.getElementById('clock').textContent=n.toLocaleTimeString('ko-KR',{hour12:false});document.getElementById('clock-date').textContent=n.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'})}
function getGPS(){if(!navigator.geolocation){sg('err','GPS 미지원');return}navigator.geolocation.getCurrentPosition(p=>{lat=p.coords.latitude;lng=p.coords.longitude;sg('ok',`위치 확인됨 (±${Math.round(p.coords.accuracy)}m)`)},e=>{sg('err',e.code===1?'GPS 권한을 허용해주세요':'GPS를 가져올 수 없습니다')},{enableHighAccuracy:true,timeout:15000})}
function sg(s,t){document.getElementById('gps-dot').className='gps-dot '+s;document.getElementById('gps-txt').textContent=t}

// Google Apps Script 호환 API 호출 함수
function callAPI(data) {
  return new Promise((resolve, reject) => {
    const callbackName = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*10000);
    const timeout = setTimeout(() => {
      delete window[callbackName];
      if(document.getElementById(callbackName)) document.getElementById(callbackName).remove();
      reject(new Error('요청 시간 초과'));
    }, 30000);

    window[callbackName] = function(result) {
      clearTimeout(timeout);
      delete window[callbackName];
      if(document.getElementById(callbackName)) document.getElementById(callbackName).remove();
      resolve(result);
    };

    const params = new URLSearchParams();
    params.append('callback', callbackName);
    params.append('data', JSON.stringify(data));

    const script = document.createElement('script');
    script.id = callbackName;
    script.src = SCRIPT_URL + '?' + params.toString();
    script.onerror = function() {
      clearTimeout(timeout);
      delete window[callbackName];
      script.remove();
      reject(new Error('서버 연결 실패'));
    };
    document.body.appendChild(script);
  });
}

async function submit(){
  const name=document.getElementById('f-name').value.trim(),phone=document.getElementById('f-phone').value.trim(),company=document.getElementById('f-company').value.trim();
  if(!name||!phone||!company)return toast('모든 항목을 입력해주세요.','error');
  const btn=document.getElementById('btn');btn.disabled=true;btn.innerHTML='<span class="spinner"></span> 처리 중...';
  try{
    const res=await callAPI({action:'checkIn',name,phone,company,lat,lng});
    if(res.success){toast(res.message,'success');save(name,phone,company)}
    else toast(res.message,'error');
  }catch(e){toast('서버 연결 실패: '+e.message,'error')}
  btn.disabled=false;btn.innerHTML='🟢 출근 등록';
}

function toast(m,t){const e=document.getElementById('toast');e.textContent=m;e.className=`toast ${t} show`;setTimeout(()=>e.classList.remove('show'),4000)}
function save(n,p,c){try{document.cookie=`ac=${encodeURIComponent(JSON.stringify({name:n,phone:p,company:c}))};max-age=2592000;path=/`}catch(e){}}
function restore(){try{const m=document.cookie.match(/ac=([^;]+)/);if(m){const d=JSON.parse(decodeURIComponent(m[1]));if(d.name)document.getElementById('f-name').value=d.name;if(d.phone)document.getElementById('f-phone').value=d.phone;if(d.company)document.getElementById('f-company').value=d.company}}catch(e){}}
</script>
</body>
</html>
