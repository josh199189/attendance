<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>관리자 - 출퇴근 확인</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080c18;--surface:#0e1528;--surface-2:#141d34;--surface-3:#1a264a;--border:#1f2e54;--border-hover:#2a3f6e;--text:#e4e9f2;--text-dim:#7e8ba6;--text-muted:#4a5672;--amber:#f5a623;--amber-dim:rgba(245,166,35,.12);--amber-glow:rgba(245,166,35,.2);--green:#00d68f;--green-dim:rgba(0,214,143,.1);--green-glow:rgba(0,214,143,.2);--red:#ff4d6a;--red-dim:rgba(255,77,106,.1);--blue:#2d7ff9;--font:'Noto Sans KR',-apple-system,sans-serif;--mono:'IBM Plex Mono',monospace;--radius:14px;--radius-sm:10px}
html,body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100dvh;-webkit-font-smoothing:antialiased}
body{background:radial-gradient(ellipse at 20% -5%,rgba(245,166,35,.06) 0%,transparent 50%),var(--bg)}
.app{max-width:640px;margin:0 auto;padding:16px 16px 60px}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:20px 0 16px;flex-wrap:wrap;gap:12px}
.hdr-left h1{font-size:22px;font-weight:900;color:#fff}
.hdr-left .sub{font-size:12px;color:var(--text-dim);margin-top:2px}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-time{font-family:var(--mono);font-size:13px;color:var(--amber);background:var(--amber-dim);border:1px solid rgba(245,166,35,.2);padding:6px 12px;border-radius:8px}
.refresh-btn{padding:6px 12px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);font-size:16px;border-radius:8px;cursor:pointer}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 10px;text-align:center}
.stat-val{font-family:var(--mono);font-size:26px;font-weight:700;line-height:1}
.stat-lbl{font-size:11px;color:var(--text-dim);margin-top:4px}
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.toolbar input[type="date"]{padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:14px;outline:none;color-scheme:dark;flex:1;min-width:140px}
.tb{padding:10px 18px;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.tb:active{transform:scale(.96)}
.tb-load{background:var(--amber);color:#000}
.tb-all{background:var(--surface);color:var(--green);border:1px solid rgba(0,214,143,.3)}
.filters{display:flex;gap:4px;margin-bottom:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:3px;overflow-x:auto}
.ft{padding:9px 14px;border:none;background:none;color:var(--text-dim);font-family:var(--font);font-size:13px;font-weight:500;border-radius:8px;cursor:pointer;transition:all .2s;white-space:nowrap}
.ft.active{background:var(--surface-3);color:#fff;font-weight:700}
.ft .c{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:10px;font-size:11px;font-weight:700;margin-left:4px;padding:0 5px}
.ft.active .c{background:var(--amber);color:#000}
.ft:not(.active) .c{background:var(--surface-3);color:var(--text-dim)}
.list{display:flex;flex-direction:column;gap:10px}
.item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;transition:border-color .2s}
.item:hover{border-color:var(--border-hover)}
.item-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.item-name{font-size:18px;font-weight:800}
.item-co{font-size:11px;color:var(--amber);background:var(--amber-dim);border:1px solid rgba(245,166,35,.15);padding:3px 10px;border-radius:20px;font-weight:500}
.item-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.item-cell{font-size:11px;color:var(--text-dim)}
.item-cell strong{display:block;font-family:var(--mono);font-size:13px;color:var(--text);margin-top:2px}
.item-cell a{color:var(--blue);text-decoration:none;font-size:11px}
.sec{margin-bottom:10px}.sec:last-child{margin-bottom:0}
.sec-t{font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:8px}
.ar{display:flex;gap:6px}
.ab{flex:1;padding:11px 8px;border:none;border-radius:8px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.ab:active{transform:scale(.95)}
.ab.confirm{background:var(--green);color:#fff}
.ab.deny{background:var(--surface-2);color:var(--red);border:1px solid rgba(255,77,106,.25)}
.ab.done-y{background:var(--green-dim);color:var(--green);border:1px solid rgba(0,214,143,.25);cursor:default}
.ab.done-n{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,77,106,.2);cursor:default}
.ab.no-data{background:var(--surface-2);color:var(--text-muted);cursor:default;font-weight:400}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge-p{background:var(--amber-dim);color:var(--amber)}
.badge-ok{background:var(--green-dim);color:var(--green)}
.badge-no{background:var(--red-dim);color:var(--red)}
.empty{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty .icon{font-size:48px;margin-bottom:12px}
.empty p{font-size:14px}
.spinner{display:inline-block;width:20px;height:20px;border:2.5px solid rgba(255,255,255,.15);border-top-color:var(--amber);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lc{display:flex;justify-content:center;padding:40px}
.last-update{text-align:center;font-size:11px;color:var(--text-muted);margin-bottom:16px}
@media(max-width:480px){.stats{grid-template-columns:repeat(2,1fr)}.item-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-left"><h1>⚙️ 관리자 확인</h1><div class="sub">출퇴근 더블체킹 관리 패널</div></div>
    <div class="hdr-right">
      <button class="refresh-btn" onclick="loadList()">🔄</button>
      <div class="hdr-time" id="hdr-time">--:--</div>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-val" id="s-total" style="color:var(--blue)">-</div><div class="stat-lbl">총 등록</div></div>
    <div class="stat"><div class="stat-val" id="s-ok" style="color:var(--green)">-</div><div class="stat-lbl">확인완료</div></div>
    <div class="stat"><div class="stat-val" id="s-wait" style="color:var(--amber)">-</div><div class="stat-lbl">대기중</div></div>
    <div class="stat"><div class="stat-val" id="s-no" style="color:var(--red)">-</div><div class="stat-lbl">미출근</div></div>
  </div>
  <div class="toolbar">
    <input type="date" id="pick-date">
    <button class="tb tb-load" onclick="loadList()">📋 조회</button>
    <button class="tb tb-all" onclick="confirmAll()">✅ 전체확인</button>
  </div>
  <div class="last-update" id="last-update"></div>
  <div class="filters">
    <button class="ft active" onclick="sf('all',this)">전체 <span class="c" id="fc-a">0</span></button>
    <button class="ft" onclick="sf('pending',this)">⏳ 대기 <span class="c" id="fc-p">0</span></button>
    <button class="ft" onclick="sf('confirmed',this)">✅ 확인 <span class="c" id="fc-c">0</span></button>
    <button class="ft" onclick="sf('denied',this)">❌ 미출근 <span class="c" id="fc-d">0</span></button>
  </div>
  <div class="list" id="list"><div class="empty"><div class="icon">📋</div><p>조회 버튼을 눌러주세요</p></div></div>
</div>
<script>
var SCRIPT_URL='https://script.google.com/macros/s/AKfycbxCKCsO7WCXgPLEZilVrnRy56ujnrje_L6u9MECN1Sm_9ESU-JcM-Tzl0S7bcS83LiTrg/exec';
var items=[],filter='all',autoRefreshTimer=null;

document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('pick-date').value=new Date().toISOString().split('T')[0];
  tc();setInterval(tc,1000);
  loadList();
  // 30초마다 자동 새로고침
  autoRefreshTimer=setInterval(loadList,30000);
});

function tc(){document.getElementById('hdr-time').textContent=new Date().toLocaleTimeString('ko-KR',{hour12:false})}

function callAPI(params,cb){
  var cn='cb_'+Date.now()+'_'+Math.floor(Math.random()*10000);
  window[cn]=function(r){delete window[cn];var el=document.getElementById(cn);if(el)el.remove();cb(null,r)};
  params.callback=cn;
  var qs=[];for(var k in params){if(params[k]!==null&&params[k]!==undefined&&params[k]!=='')qs.push(encodeURIComponent(k)+'='+encodeURIComponent(params[k]))}
  var s=document.createElement('script');s.id=cn;s.src=SCRIPT_URL+'?'+qs.join('&');
  s.onerror=function(){delete window[cn];s.remove();cb(new Error('서버 연결 실패'))};
  document.body.appendChild(s);
  setTimeout(function(){if(window[cn]){delete window[cn];var el=document.getElementById(cn);if(el)el.remove();cb(new Error('요청 시간 초과'))}},30000);
}

function loadList(){
  var date=document.getElementById('pick-date').value;var el=document.getElementById('list');
  el.innerHTML='<div class="lc"><span class="spinner"></span></div>';
  callAPI({action:'getTodayList',date:date},function(err,res){
    if(err){el.innerHTML='<div class="empty"><p>로드 실패: '+err.message+'</p></div>';return}
    if(!res.success||!res.list||res.list.length===0){items=[];upStats();upFC();el.innerHTML='<div class="empty"><div class="icon">📭</div><p>'+date+' 등록자 없음</p></div>';return}
    items=res.list;upStats();upFC();render();
    document.getElementById('last-update').textContent='마지막 갱신: '+new Date().toLocaleTimeString('ko-KR',{hour12:false});
  });
}

function render(){
  var el=document.getElementById('list');
  var f=filter==='all'?items:items.filter(function(i){return gs(i)===filter});
  if(!f.length){el.innerHTML='<div class="empty"><div class="icon">🔍</div><p>해당 조건 인원 없음</p></div>';return}
  el.innerHTML=f.map(function(i){
    var st=gs(i);var cib,cob;
    if(i.adminCheckIn&&i.adminCheckIn!=='미출근')cib='<button class="ab done-y">✅ 확인됨 '+esc(i.adminCheckIn)+'</button>';
    else if(i.adminCheckIn==='미출근')cib='<button class="ab done-n">❌ 미출근</button>';
    else cib='<button class="ab confirm" onclick="dc('+i.row+',\'checkIn\',true)">✅ 출근 확인</button><button class="ab deny" onclick="dc('+i.row+',\'checkIn\',false)">❌ 미출근</button>';
    if(!i.checkOutTime)cob='<button class="ab no-data">퇴근 미등록</button>';
    else if(i.adminCheckOut&&i.adminCheckOut!=='미퇴근')cob='<button class="ab done-y">✅ 확인됨 '+esc(i.adminCheckOut)+'</button>';
    else if(i.adminCheckOut==='미퇴근')cob='<button class="ab done-n">❌ 미퇴근</button>';
    else cob='<button class="ab confirm" onclick="dc('+i.row+',\'checkOut\',true)">✅ 퇴근 확인</button><button class="ab deny" onclick="dc('+i.row+',\'checkOut\',false)">❌ 미퇴근</button>';
    var gi=i.checkInLat?'<a href="https://maps.google.com/?q='+i.checkInLat+','+i.checkInLng+'" target="_blank">📍지도</a>':'<span style="color:var(--text-muted)">GPS없음</span>';
    var go=i.checkOutLat?'<a href="https://maps.google.com/?q='+i.checkOutLat+','+i.checkOutLng+'" target="_blank">📍지도</a>':'';
    var bd=st==='confirmed'?'<span class="badge badge-ok">✅ 확인</span>':st==='denied'?'<span class="badge badge-no">❌ 미출근</span>':'<span class="badge badge-p">⏳ 대기</span>';
    return '<div class="item"><div class="item-top"><span class="item-name">'+esc(i.name)+' '+bd+'</span><span class="item-co">'+esc(i.company)+'</span></div><div class="item-grid"><div class="item-cell">자가 출근<br><strong>'+(i.checkInTime||'-')+'</strong>'+gi+'</div><div class="item-cell">자가 퇴근<br><strong>'+(i.checkOutTime||'-')+'</strong>'+go+'</div><div class="item-cell">전화번호<br><strong>'+esc(i.phone)+'</strong></div></div><div class="sec"><div class="sec-t">▸ 출근 확인</div><div class="ar">'+cib+'</div></div><div class="sec"><div class="sec-t">▸ 퇴근 확인</div><div class="ar">'+cob+'</div></div></div>';
  }).join('');
}

function dc(row,type,confirmed){callAPI({action:'adminConfirm',row:String(row),type:type,confirmed:String(confirmed)},function(err,res){if(err)alert('처리 실패');else if(res.success)loadList();else alert(res.message)})}
function confirmAll(){
  var pending=items.filter(function(i){return !i.adminCheckIn||i.adminCheckIn===''});
  if(!pending.length)return alert('대기중인 인원이 없습니다.');
  if(!confirm('대기중 '+pending.length+'명 전체 출근 확인?'))return;
  var idx=0;function next(){if(idx>=pending.length){loadList();return}callAPI({action:'adminConfirm',row:String(pending[idx].row),type:'checkIn',confirmed:'true'},function(){idx++;next()});}next();
}
function gs(i){if(i.adminCheckIn==='미출근')return'denied';if(i.adminCheckIn&&i.adminCheckIn!=='')return'confirmed';return'pending'}
function sf(f,el){filter=f;document.querySelectorAll('.ft').forEach(function(t){t.classList.remove('active')});el.classList.add('active');render()}
function upFC(){var c={all:items.length,pending:0,confirmed:0,denied:0};items.forEach(function(i){c[gs(i)]++});document.getElementById('fc-a').textContent=c.all;document.getElementById('fc-p').textContent=c.pending;document.getElementById('fc-c').textContent=c.confirmed;document.getElementById('fc-d').textContent=c.denied}
function upStats(){var ok=0,w=0,no=0;items.forEach(function(i){var s=gs(i);if(s==='confirmed')ok++;else if(s==='denied')no++;else w++});document.getElementById('s-total').textContent=items.length;document.getElementById('s-ok').textContent=ok;document.getElementById('s-wait').textContent=w;document.getElementById('s-no').textContent=no}
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}
</script>
</body>
</html>
