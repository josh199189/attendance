<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>퇴근 등록</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#070b14;--surface:#0d1525;--surface-2:#131e33;--border:#1c2d4e;--border-focus:#4a8aeb;--text:#dfe6f2;--text-dim:#7a8baa;--text-muted:#4a5a78;--blue:#5b9cf6;--blue-dark:#3d7de8;--blue-glow:rgba(91,156,246,.22);--font:'Noto Sans KR',-apple-system,sans-serif;--mono:'IBM Plex Mono',monospace;--radius:16px;--radius-sm:11px}
html,body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100dvh;-webkit-font-smoothing:antialiased}
body{background:radial-gradient(ellipse at 50% -15%,rgba(91,156,246,.09) 0%,transparent 60%),var(--bg)}
.app{max-width:420px;margin:0 auto;padding:24px 16px 48px}
.hdr{text-align:center;padding:24px 0 12px}
.hdr-icon{width:72px;height:72px;margin:0 auto 16px;background:linear-gradient(135deg,var(--blue),var(--blue-dark));border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:34px;box-shadow:0 8px 40px var(--blue-glow)}
.hdr h1{font-size:28px;font-weight:900;letter-spacing:-1px;color:#fff}
.hdr .sub{font-size:13px;color:var(--text-dim);margin-top:4px}
.clock-wrap{text-align:center;margin:20px 0 28px}
.clock{font-family:var(--mono);font-size:48px;font-weight:600;color:#fff;letter-spacing:3px;line-height:1}
.clock-date{font-size:13px;color:var(--text-dim);margin-top:6px}
.gps{display:flex;align-items:center;gap:9px;padding:12px 16px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:20px;font-size:12px;color:var(--text-dim)}
.gps-dot{width:8px;height:8px;border-radius:50%;background:var(--text-muted);flex-shrink:0}
.gps-dot.ok{background:#00d68f;box-shadow:0 0 10px rgba(0,214,143,.3);animation:pulse 2s infinite}
.gps-dot.err{background:#ff5252}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;box-shadow:0 4px 32px rgba(0,0,0,.4)}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-dim);margin-bottom:6px}
.field input{width:100%;padding:14px 16px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:16px;outline:none;transition:border-color .2s,box-shadow .2s}
.field input:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px var(--blue-glow)}
.field input::placeholder{color:var(--text-muted)}
.btn{width:100%;padding:18px;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:17px;font-weight:800;cursor:pointer;transition:all .2s;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,var(--blue),var(--blue-dark));color:#fff;box-shadow:0 6px 28px var(--blue-glow)}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-130px);max-width:380px;width:calc(100% - 32px);padding:16px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;z-index:999;transition:transform .35s cubic-bezier(.4,0,.2,1);box-shadow:0 8px 32px rgba(0,0,0,.5)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{background:#0d2733;border:1px solid rgba(0,214,143,.35);color:#00d68f}
.toast.error{background:#331015;border:1px solid rgba(255,82,82,.35);color:#ff5252}
.spinner{display:inline-block;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">
  <div class="hdr"><div class="hdr-icon">👋</div><h1>퇴근 등록</h1><div class="sub">수고하셨습니다! 퇴근 정보를 입력해주세요</div></div>
  <div class="clock-wrap"><div class="clock" id="clock">--:--:--</div><div class="clock-date" id="clock-date">-</div></div>
  <div class="card">
    <div class="gps"><div class="gps-dot" id="gps-dot"></div><span id="gps-txt">GPS 위치 확인 중...</span></div>
    <div class="field"><label>이름 *</label><input type="text" id="f-name" placeholder="홍길동" autocomplete="name"></div>
    <div class="field"><label>전화번호 *</label><input type="tel" id="f-phone" placeholder="010-1234-5678" autocomplete="tel"></div>
    <button class="btn" id="btn" onclick="doSubmit()">👋 퇴근 등록</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var SCRIPT_URL='https://script.google.com/macros/s/AKfycbx9I3NtimSJMHbnYlPTOGdVC-nzO-sjv5c_ARe1hg0z-S_O451CZKNirim3yxY0znTqHQ/exec';
var lat=null,lng=null;
document.addEventListener('DOMContentLoaded',function(){tick();setInterval(tick,1000);getGPS();restore()});
function tick(){var n=new Date();document.getElementById('clock').textContent=n.toLocaleTimeString('ko-KR',{hour12:false});document.getElementById('clock-date').textContent=n.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'})}
function getGPS(){if(!navigator.geolocation){sg('err','GPS 미지원');return}navigator.geolocation.getCurrentPosition(function(p){lat=p.coords.latitude;lng=p.coords.longitude;sg('ok','위치 확인됨 (±'+Math.round(p.coords.accuracy)+'m)')},function(e){sg('err',e.code===1?'GPS 권한을 허용해주세요':'GPS를 가져올 수 없습니다')},{enableHighAccuracy:true,timeout:15000})}
function sg(s,t){document.getElementById('gps-dot').className='gps-dot '+s;document.getElementById('gps-txt').textContent=t}

function callAPI(params,cb){
  var cn='cb_'+Date.now()+'_'+Math.floor(Math.random()*10000);
  window[cn]=function(r){delete window[cn];var el=document.getElementById(cn);if(el)el.remove();cb(null,r)};
  params.callback=cn;
  var qs=[];for(var k in params){if(params[k]!==null&&params[k]!==undefined&&params[k]!=='')qs.push(encodeURIComponent(k)+'='+encodeURIComponent(params[k]))}
  var s=document.createElement('script');s.id=cn;s.src=SCRIPT_URL+'?'+qs.join('&');
  s.onerror=function(){delete window[cn];s.remove();cb(new Error('서버 연결 실패'))};
  document.body.appendChild(s);
  setTimeout(function(){if(window[cn]){delete window[cn];var el=document.getElementById(cn);if(el)el.remove();cb(new Error('요청 시간 초과'))}},30000);
}

function doSubmit(){
  var name=document.getElementById('f-name').value.trim(),phone=document.getElementById('f-phone').value.trim();
  if(!name||!phone)return toast('이름과 전화번호를 입력해주세요.','error');
  var btn=document.getElementById('btn');btn.disabled=true;btn.innerHTML='<span class="spinner"></span> 처리 중...';
  if(navigator.geolocation){try{navigator.geolocation.getCurrentPosition(function(p){lat=p.coords.latitude;lng=p.coords.longitude;send()},function(){send()},{enableHighAccuracy:true,timeout:5000})}catch(e){send()}}else{send()}
  function send(){
    callAPI({action:'checkOut',name:name,phone:phone,lat:lat||'',lng:lng||''},function(err,res){
      if(err)toast(err.message,'error');
      else if(res.success)toast(res.message,'success');
      else toast(res.message,'error');
      btn.disabled=false;btn.innerHTML='👋 퇴근 등록';
    });
  }
}
function toast(m,t){var e=document.getElementById('toast');e.textContent=m;e.className='toast '+t+' show';setTimeout(function(){e.classList.remove('show')},4000)}
function restore(){try{var m=document.cookie.match(/ac=([^;]+)/);if(m){var d=JSON.parse(decodeURIComponent(m[1]));if(d.name)document.getElementById('f-name').value=d.name;if(d.phone)document.getElementById('f-phone').value=d.phone}}catch(e){}}
</script>
</body>
</html>
